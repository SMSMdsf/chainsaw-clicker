<!DOCTYPE html>
<html>
<head>
    <title>Zombie.io | 3D Perspective Edition</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        
        /* This container forces everything inside into actual 3D perspective tilt! */
        #game-wrapper {
            perspective: 800px;
            perspective-origin: 50% 30%;
            width: 100vw;
            height: 85vh;
            display: none;
        }
        
        canvas { 
            background: #111411; 
            border: 4px solid #ff3300; 
            cursor: crosshair; 
            margin: 40px auto; 
            box-shadow: 0 20px 40px rgba(255, 51, 0, 0.5);
            /* This rotates the flat canvas so it looks like a 3D floor map! */
            transform: rotateX(45deg);
            transform-style: preserve-3d;
        }

        .screen { padding: 40px; max-width: 700px; margin: auto; height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .char-btn { padding: 15px; margin: 8px; background: #1a1a1a; color: #00ff00; border: 2px solid #00ff00; cursor: pointer; font-size: 18px; width: 220px; text-transform: uppercase; font-weight: bold; }
        .char-btn:hover { background: #00ff00; color: black; box-shadow: 0 0 15px #00ff00; }
        #ui-box { background: rgba(0,0,0,0.9); padding: 12px; border-bottom: 3px solid #ff3300; display: none; justify-content: space-around; font-size: 18px; font-weight: bold; }
        .btn-upgrade { background: #ff3300; color: white; border: none; padding: 8px 16px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-upgrade:disabled { background: #444; color: #777; cursor: not-allowed; }
        #cutscene-text { font-size: 22px; line-height: 1.6; color: #ffffff; text-shadow: 0 0 8px #ff0000; min-height: 150px; }
        .next-btn { background: #fff; color: #000; border: none; padding: 10px 25px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- CUTSCENE SCREEN -->
    <div id="cutscene-screen" class="screen">
        <h2 style="color: #ff3300; font-size: 32px;">⚠️ EMERGENCY BROADCAST ⚠️</h2>
        <div id="cutscene-text">Loading transmission...</div>
        <button id="cutscene-btn" class="next-btn" onclick="nextCutscene()">NEXT</button>
    </div>

    <!-- CHARACTER SELECTION -->
    <div id="menu-screen" class="screen" style="display:none;">
        <h1>THE OUTBREAK HAS BEGUN</h1>
        <h3>SELECT YOUR SURVIVOR:</h3>
        <div style="display: flex; flex-wrap: wrap; justify-content: center; max-width: 500px;">
            <button class="char-btn" onclick="startGame('Shuceeb', '#00ffff')">Shuceeb</button>
            <button class="char-btn" onclick="startGame('Aadam', '#ff0055')">Aadam</button>
            <button class="char-btn" onclick="startGame('Yakoub', '#ffcc00')">Yakoub</button>
            <button class="char-btn" onclick="startGame('Daiyon', '#9900ff')">Daiyon</button>
            <button class="char-btn" onclick="startGame('Arafat', '#00ff66')">Arafat</button>
            <button class="char-btn" onclick="startGame('Naythan', '#ff6600')">Naythan</button>
        </div>
    </div>

    <!-- GAME UI & ARENA -->
    <div id="ui-box">
        <div>Survivor: <span id="ui-name" style="color:yellow;">---</span></div>
        <div>Cash: $<span id="ui-cash">0</span></div>
        <div>Gun Level: <span id="ui-lvl">1</span>/100</div>
        <div id="ui-ability" style="color: cyan;">No Perks Locked</div>
        <button id="up-btn" class="btn-upgrade" onclick="buyUpgrade()">UPGRADE GUN ($50)</button>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="800" height="550"></canvas>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'shoot') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'hit') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(60, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        const cutsceneLines = [
            "Shuceeb, Aadam, Yakoub, Daiyon, Arafat, and Naythan were chilled out at their house playing games...",
            "Suddenly, the power cuts out and Mr. Trump appears on screen with an emergency broadcast!",
            "A rogue scientist accidentally cracked open a mysterious Alien Egg! Spores are turning people into monsters!",
            "Grab your gear! It's time to defend the block!"
        ];
        let cutsceneIdx = 0;
        function nextCutscene() {
            cutsceneIdx++;
            if (cutsceneIdx < cutsceneLines.length) {
                document.getElementById("cutscene-text").innerText = cutsceneLines[cutsceneIdx];
                if (cutsceneIdx === cutsceneLines.length - 1) document.getElementById("cutscene-btn").innerText = "ENTER THE 3D ZONE";
            } else {
                document.getElementById("cutscene-screen").style.display = "none";
                document.getElementById("menu-screen").style.display = "flex";
            }
        }
        document.getElementById("cutscene-text").innerText = cutsceneLines[0];

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let cash = 445, lvl = 2, cost = 62;
        let player = { x: 400, y: 275, size: 20, color: '#00ffff', speed: 4, angle: 0 };
        let bullets = [], zombies = [], keys = {};
        let mouseX = 0, mouseY = 0;

        function startGame(name, color) {
            player.color = color;
            document.getElementById("ui-name").innerText = name;
            document.getElementById("ui-name").style.color = color;
            document.getElementById("menu-screen").style.display = "none";
            document.getElementById("ui-box").style.display = "flex";
            document.getElementById("game-wrapper").style.display = "block";
            spawnZombie();
            requestAnimationFrame(gameLoop);
        }

        function buyUpgrade() {
            if (cash >= cost && lvl < 100) {
                cash -= cost; lvl++; cost = Math.floor(cost * 1.25);
                if (lvl >= 10) player.speed = 6.5;
                updateUI();
            }
        }

        window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
        
        // This adjusts mouse math to compensate for the 3D screen tilt angle
        window.addEventListener("mousemove", e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = (e.clientY - rect.top) * 1.4; 
        });
        
        canvas.addEventListener("mousedown", () => { fireWeapon(); });

        function fireWeapon() {
            playSound('shoot');
            const baseAngle = Math.atan2(mouseY - player.y, mouseX - player.x);
            bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle) * 8, vy: Math.sin(baseAngle) * 8 });
        }

        function spawnZombie() {
            let side = Math.floor(Math.random() * 4);
            let z = { x: 0, y: 0 };
            if(side === 0) { z.x = Math.random()*800; z.y = -30; }
            else if(side === 1) { z.x = 830; z.y = Math.random()*550; }
            else if(side === 2) { z.x = Math.random()*800; z.y = 580; }
            else { z.x = -30; z.y = Math.random()*550; }
            zombies.push(z);
            setTimeout(spawnZombie, 1200);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, 800, 550);

            if (keys['w'] && player.y > player.size) player.y -= player.speed;
            if (keys['s'] && player.y < 550 - player.size) player.y += player.speed;
            if (keys['a'] && player.x > player.size) player.x -= player.speed;
            if (keys['d'] && player.x < 800 - player.size) player.x += player.speed;

            player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);

            // DRAW 3D GROUND GRID EFFECTS
            ctx.strokeStyle = "#223322"; ctx.lineWidth = 1;
            for(let i=0; i<800; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,550); ctx.stroke(); }
            for(let j=0; j<550; j+=40) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(800,j); ctx.stroke(); }

            // DRAW PLAYER BODY (With 3D shadow offset)
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.beginPath(); ctx.arc(player.x, player.y + 12, player.size, 0, Math.PI*2); ctx.fill();

            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = "#555"; ctx.fillRect(5, -5, 25, 6); // Gun Barrel
            ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.arc(0, 0, player.size, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#e0a96d"; ctx.beginPath(); ctx.arc(0, 0, player.size*0.6, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            // BULLETS
            ctx.fillStyle = "#ffff00";
            bullets.forEach((b, bIdx) => {
                b.x += b.vx; b.y += b.vy;
                ctx.fillRect(b.x - 3, b.y - 3, 6, 6);
                if (b.x < 0 || b.x > 800 || b.y < 0 || b.y > 550) bullets.splice(bIdx, 1);

                zombies.forEach((z, zIdx) => {
                    if (Math.hypot(b.x - z.x, b.y - z.y) < 22) {
                        zombies.splice(zIdx, 1); bullets.splice(bIdx, 1);
                        cash += 15; playSound('hit'); updateUI();
                    }
                });
            });

            // ZOMBIES (With 3D drop shadow)
            zombies.forEach(z => {
                let zAngle = Math.atan2(player.y - z.y, player.x - z.x);
                z.x += Math.cos(zAngle) * 1.5; z.y += Math.sin(zAngle) * 1.5;
                
                ctx.fillStyle = "rgba(0,0,0,0.4)";
                ctx.beginPath(); ctx.arc(z.x, z.y + 10, 14, 0, Math.PI*2); ctx.fill();

                ctx.fillStyle = "#39e639";
                ctx.beginPath(); ctx.arc(z.x, z.y, 14, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#ff0000"; ctx.fillRect(z.x + Math.cos(zAngle)*6 - 2, z.y + Math.sin(zAngle)*6 - 2, 4, 4);
            });

            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            document.getElementById("ui-cash").innerText = cash;
            document.getElementById("ui-lvl").innerText = lvl;
            document.getElementById("up-btn").innerText = `UPGRADE GUN ($${cost})`;
            document.getElementById("up-btn").disabled = cash < cost || lvl >= 100;
        }
        updateUI();
    </script>
</body>
</html>
