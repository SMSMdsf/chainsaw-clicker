<!DOCTYPE html>
<html>
<head>
    <title>Zombie.io | 3D Squad Survival</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        #canvas3d { display: none; width: 100vw; height: 85vh; }
        .screen { padding: 40px; max-width: 700px; margin: auto; height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .char-btn { padding: 15px; margin: 8px; background: #1a1a1a; color: #00ff00; border: 2px solid #00ff00; cursor: pointer; font-size: 18px; width: 220px; text-transform: uppercase; font-weight: bold; }
        .char-btn:hover { background: #00ff00; color: black; box-shadow: 0 0 15px #00ff00; }
        #ui-box { background: rgba(0,0,0,0.9); padding: 12px; border-bottom: 3px solid #ff3300; display: none; justify-content: space-around; font-size: 18px; font-weight: bold; height: 10vh; box-sizing: border-box; }
        .btn-upgrade { background: #ff3300; color: white; border: none; padding: 8px 16px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        #cutscene-text { font-size: 22px; line-height: 1.6; color: #ffffff; text-shadow: 0 0 8px #ff0000; min-height: 150px; }
        .next-btn { background: #fff; color: #000; border: none; padding: 10px 25px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
    <!-- We load the Three.js library from a secure web network -->
    <script src="cloudflare.com"></script>
</head>
<body>

    <!-- INTRO CUTSCENE -->
    <div id="cutscene-screen" class="screen">
        <h2 style="color: #ff3300; font-size: 32px;">⚠️ EMERGENCY BROADCAST ⚠️</h2>
        <div id="cutscene-text">Loading transmission...</div>
        <button id="cutscene-btn" class="next-btn" onclick="nextCutscene()">NEXT</button>
    </div>

    <!-- SQUAD MENU -->
    <div id="menu-screen" class="screen" style="display:none;">
        <h1>THE OUTBREAK HAS BEGUN</h1>
        <h3>SELECT YOUR SURVIVOR:</h3>
        <div style="display: flex; flex-wrap: wrap; justify-content: center; max-width: 500px;">
            <button class="char-btn" onclick="startGame('Shuceeb', 0x00ffff)">Shuceeb</button>
            <button class="char-btn" onclick="startGame('Aadam', 0xff0055)">Aadam</button>
            <button class="char-btn" onclick="startGame('Yakoub', 0xffcc00)">Yakoub</button>
            <button class="char-btn" onclick="startGame('Daiyon', 0x9900ff)">Daiyon</button>
            <button class="char-btn" onclick="startGame('Arafat', 0x00ff66)">Arafat</button>
            <button class="char-btn" onclick="startGame('Naythan', 0xff6600)">Naythan</button>
        </div>
    </div>

    <!-- HUD STATS BOARD -->
    <div id="ui-box">
        <div>Survivor: <span id="ui-name" style="color:yellow;">---</span></div>
        <div>Cash: $<span id="ui-cash">0</span></div>
        <div>Gun Level: <span id="ui-lvl">1</span>/100</div>
        <button id="up-btn" class="btn-upgrade" onclick="buyUpgrade()">UPGRADE GUN ($50)</button>
    </div>

    <div id="canvas3d"></div>

    <script>
        // Intro Text Setup
        const cutsceneLines = [
            "Shuceeb, Aadam, Yakoub, Daiyon, Arafat, and Naythan were chilled out at their house playing video games together...",
            "Suddenly, the power cuts out. The TV flashes static, replacing the game with an emergency news alert.",
            "Mr. Trump appears on screen: 'My fellow Americans... a rogue scientist accidentally dropped and cracked open a mysterious Alien Egg asset...'",
            "Outside the window, loud alien screeches echo down the street. The friend squad is terrified. Time to fight!'"
        ];
        let cutsceneIdx = 0;
        function nextCutscene() {
            cutsceneIdx++;
            if (cutsceneIdx < cutsceneLines.length) {
                document.getElementById("cutscene-text").innerText = cutsceneLines[cutsceneIdx];
                if (cutsceneIdx === cutsceneLines.length - 1) document.getElementById("cutscene-btn").innerText = "ENTER THE 3D APOCALYPSE";
            } else {
                document.getElementById("cutscene-screen").style.display = "none";
                document.getElementById("menu-screen").style.display = "flex";
            }
        }
        document.getElementById("cutscene-text").innerText = cutsceneLines[0];

        // 3D Engine Variables
        let scene, camera, renderer, playerMesh;
        let cash = 0, lvl = 1, cost = 50, playerSpeed = 0.15;
        let bullets = [], zombies = [], keys = {};
        let planeSize = 40;

        function startGame(name, colorHex) {
            document.getElementById("menu-screen").style.display = "none";
            document.getElementById("ui-box").style.display = "flex";
            document.getElementById("canvas3d").style.display = "block";
            document.getElementById("ui-name").innerText = name;

            // 1. Create the 3D Scene World Container
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            // 2. Set Up 3D Camera Viewing Rig
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / (window.innerHeight * 0.85), 0.1, 1000);
            camera.position.set(0, 20, 12); // High isometric view pointing down at squad
            camera.lookAt(0, 0, 0);

            // 3. Render Initialization
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight * 0.85);
            document.getElementById("canvas3d").appendChild(renderer.domElement);

            // 4. Lights Setup
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 20, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x333333));

            // 5. Build 3D Floor Grid Field
            const grid = new THREE.GridHelper(planeSize, 40, 0xff3300, 0x222222);
            grid.position.y = -0.5;
            scene.add(grid);

            // 6. Spawn the Player Box Character Node Shape
            const playerGeo = new THREE.BoxGeometry(1, 1, 1);
            const playerMat = new THREE.MeshStandardMaterial({ color: colorHex });
            playerMesh = new THREE.Mesh(playerGeo, playerMat);
            scene.add(playerMesh);

            // Inputs
            window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
            window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
            window.addEventListener("mousedown", fire3DBullet);

            setInterval(spawn3DZombie, 1500);
            animate3D();
        }

        function fire3DBullet() {
            // Shoots forward along the player direction axis orientation
            const bGeo = new THREE.SphereGeometry(0.15, 8, 8);
            const bMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const bMesh = new THREE.Mesh(bGeo, bMat);
            bMesh.position.set(playerMesh.position.x, playerMesh.position.y, playerMesh.position.z);
            
            // Calculate direction using simple rotation vector matrix logic
            let angle = playerMesh.rotation.y;
            bullets.push({ mesh: bMesh, vx: Math.sin(angle) * 0.4, vz: Math.cos(angle) * 0.4 });
            scene.add(bMesh);
        }

        function spawn3DZombie() {
            const zGeo = new THREE.BoxGeometry(0.9, 0.9, 0.9);
            const zMat = new THREE.MeshStandardMaterial({ color: 0x39e639 });
            const zMesh = new THREE.Mesh(zGeo, zMat);
            
            // Random point around floor boundary perimeter circle edges
            let randAngle = Math.random() * Math.PI * 2;
            zMesh.position.set(Math.cos(randAngle) * 18, 0, Math.sin(randAngle) * 18);
            zombies.push(zMesh);
            scene.add(zMesh);
        }

        function buyUpgrade() {
            if (cash >= cost && lvl < 100) {
                cash -= cost; lvl++; cost = Math.floor(cost * 1.3);
                playerSpeed += 0.02;
                document.getElementById("ui-cash").innerText = cash;
                document.getElementById("ui-lvl").innerText = lvl;
                document.getElementById("up-btn").innerText = `UPGRADE GUN ($${cost})`;
            }
        }

        function animate3D() {
            requestAnimationFrame(animate3D);

            // Keyboard Movement Inputs Vector Logic Processing Loop
            if (keys['w']) { playerMesh.position.z -= playerSpeed; playerMesh.rotation.y = Math.PI; }
            if (keys['s']) { playerMesh.position.z += playerSpeed; playerMesh.rotation.y = 0; }
            if (keys['a']) { playerMesh.position.x -= playerSpeed; playerMesh.rotation.y = -Math.PI/2; }
            if (keys['d']) { playerMesh.position.x += playerSpeed; playerMesh.rotation.y = Math.PI/2; }

            // Dynamic 3D Camera Follow Matrix Tracking Logic Anchor Point Target
            camera.position.x = playerMesh.position.x;
            camera.position.z = playerMesh.position.z + 12;
            camera.lookAt(playerMesh.position);

            // Move Bullets Translation Actions
            bullets.forEach((b, idx) => {
                b.mesh.position.x += b.vx;
                b.mesh.position.z += b.vz;
                
                if(b.mesh.position.length() > 30) {
                    scene.remove(b.mesh); bullets.splice(idx, 1);
                }
            });

            // Zombie Chase Character Translation Iteration Cycle
            zombies.forEach((z, zIdx) => {
                let dirX = playerMesh.position.x - z.position.x;
                let dirZ = playerMesh.position.z - z.position.z;
                let dist = Math.hypot(dirX, dirZ);
                
                if (dist > 0.1) {
                    z.position.x += (dirX / dist) * 0.04;
                    z.position.z += (dirZ / dist) * 0.04;
                }

                // Bullet Collision Intersects Tests Loops Checkpoints
                bullets.forEach((b, bIdx) => {
                    if (z.position.distanceTo(b.mesh.position) < 0.8) {
                        scene.remove(z); zombies.splice(zIdx, 1);
                        scene.remove(b.mesh); bullets.splice(bIdx, 1);
                        cash += 15;
                        document.getElementById("ui-cash").innerText = cash;
                    }
                });
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
